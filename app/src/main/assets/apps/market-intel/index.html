<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="robots" content="noindex,nofollow">
  <title>Market Intel — Amy FX</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/amy-fx-192.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/amy-fx-180.png">
  <link rel="stylesheet" href="../shared/market-intelligence.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="intel-container">
    <section id="market-command-strip" class="amy-command-strip" aria-label="Market command strip"></section>
    <header class="intel-header">
      <h1>🔍 Market Intel</h1>
      <p class="subtitle">News & Liquidity Heatmap</p>
    </header>

    <nav class="intel-tabs">
      <button class="intel-tab active" data-tab="news">📰 News</button>
      <button class="intel-tab" data-tab="heatmap">🔥 Heatmap</button>
      <button class="intel-tab" data-tab="liquidity">💧 Liquidity</button>
    </nav>

    <section id="intel-briefing" class="amy-briefing" aria-live="polite"></section>

    <section id="panel-news" class="intel-panel active">
      <div class="status-bar" id="news-status">🔄 Memuat berita...</div>
      <div id="news-list" class="news-list"></div>
    </section>

    <section id="panel-heatmap" class="intel-panel">
      <div class="status-bar" id="heatmap-status">🔄 Menghitung heatmap...</div>
      <div class="heatmap-info">
        <span class="current-price" id="heatmap-price">--</span>
        <span class="timeframe">M15</span>
      </div>
      <div id="heatmap-canvas" class="heatmap-canvas"></div>
      <div class="heatmap-legend">
        <span class="legend-item"><span class="dot res"></span> Resistance (Swing Highs)</span>
        <span class="legend-item"><span class="dot sup"></span> Support (Swing Lows)</span>
        <span class="legend-item"><span class="dot cur"></span> Harga Saat Ini</span>
      </div>
    </section>

    <section id="panel-liquidity" class="intel-panel">
      <div class="status-bar" id="liquidity-status">🔄 Melacak liquidity...</div>
      <div id="liquidity-list" class="liquidity-list"></div>
    </section>

    <div id="loading-overlay" class="loading-overlay">
      <div class="spinner"></div>
      <p>Memuat Market Intel...</p>
    </div>
  </div>

  <script src="/platform-adapter.js"></script>
  <script src="/member-auth.js"></script>
  <script src="../shared/market-intelligence.js"></script>
  <script src="app.js"></script>
  <script src="/pwa-bootstrap.js"></script>
</body>
</html>
