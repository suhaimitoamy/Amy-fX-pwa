<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>Amy FX — Offline</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 0,rgba(212,175,55,.16),transparent 42%),#050505;color:#fff;font-family:system-ui,sans-serif}.card{width:min(100%,430px);padding:28px;border:1px solid rgba(212,175,55,.35);border-radius:22px;background:rgba(15,15,15,.9);box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}.logo{width:76px;height:76px;margin:0 auto 18px;display:grid;place-items:center;border:2px solid #d4af37;border-radius:22px;color:#d4af37;font-weight:900;letter-spacing:2px}h1{margin:0 0 8px;font-size:24px;color:#f9f1c8}p{margin:0;color:#aaa;line-height:1.6;font-size:14px}.actions{display:flex;justify-content:center;gap:10px;margin-top:22px}button,a{border:1px solid rgba(212,175,55,.45);border-radius:11px;padding:11px 14px;background:#18140a;color:#f9f1c8;text-decoration:none;font-weight:800}button{background:#d4af37;color:#080808}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">AMY</div>
    <h1>Koneksi sedang offline</h1>
    <p>Modul dan data yang pernah dibuka masih dapat tersedia dari cache. Data harga, candle, heatmap, dan berita terbaru memerlukan internet.</p>
    <div class="actions">
      <a href="/">Beranda</a>
      <button type="button" onclick="location.reload()">Coba lagi</button>
    </div>
  </main>
</body>
</html>
