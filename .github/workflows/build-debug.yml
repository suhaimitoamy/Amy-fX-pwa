name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Amy FX
        uses: actions/checkout@v4

      - name: Checkout Academy Vault
        uses: actions/checkout@v4
        with:
          repository: suhaimitoamy/amy-trading-academy-vault
          path: _academy_vault
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Academy generator dependencies
        run: python -m pip install --disable-pip-version-check pyyaml mistune beautifulsoup4

      - name: Generate privacy-filtered connected Academy
        run: |
          python scripts/generate_connected_academy.py \
            --vault _academy_vault \
            --academy app/src/main/assets/apps/academy

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Amy-FX-debug-apk
          path: app/build/outputs/apk/debug/*.apk
